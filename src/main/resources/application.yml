spring:
  application:
    name: computer-ecommerce

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 1h # 默认缓存过期时间
      cache-null-values: false # 不缓存空值
      use-key-prefix: true # 使用key前缀
      key-prefix: "cache:" # key前缀

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/computer_ecommerce?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 0416
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis配置
#  redis:
#    lettuce:
#      pool:
#        max-active: 20
#        max-idle: 10
#        min-idle: 5
#        max-wait: 3000ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  data:
    redis:
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 3000ms

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.computer.ecommerce.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: computer-ecommerce-secret-key-2026-spring-boot-3-jwt-token
  expiration: 86400000 # 24小时
  header: Authorization
  token-prefix: "Bearer "

# 应用配置
app:
  # 文件上传路径
  upload-dir: ./uploads/
  # 分页配置
  page-size: 20
  # 跨域配置
  cors:
    allowed-origins: "http://localhost:8080,http://localhost:3000,http://localhost:5173,http://localhost:5174"
    allowed-methods: "*"
    allowed-headers: "*"
    allow-credentials: true

# 日志配置
logging:
  level:
    com.computer.ecommerce: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.jdbc: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.apache.ibatis: DEBUG

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json